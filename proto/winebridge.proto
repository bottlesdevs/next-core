syntax = "proto3";

package winebridge;

import "google/protobuf/empty.proto";

service WineBridge {
  // Process Management
  rpc ListProcesses(google.protobuf.Empty) returns (ListProcessesResponse);
  rpc LaunchProcess(LaunchProcessRequest) returns (LaunchProcessResponse);
  rpc KillProcess(KillProcessRequest) returns (google.protobuf.Empty);

  // Registry Management
  rpc CreateRegistryKey(RegistryKeyRequest) returns (google.protobuf.Empty);
  rpc DeleteRegistryTree(RegistryKeyRequest) returns (google.protobuf.Empty);
  rpc GetRegistryKey(RegistryKeyRequest) returns (RegistryKey);
  rpc GetRegistryValue(RegistryValueRequest) returns (RegistryValue);
  rpc SetRegistryValue(SetRegistryValueRequest) returns (google.protobuf.Empty);
  rpc DeleteRegistryValue(RegistryValueRequest) returns (google.protobuf.Empty);

  // Prefix FS Operations
  rpc CreateDirectory(FileOperationRequest) returns (FileOperationResponse);
  rpc DeleteFile(FileOperationRequest) returns (FileOperationResponse);
  rpc CopyFile(CopyMoveRequest) returns (FileOperationResponse);
  rpc MoveFile(CopyMoveRequest) returns (FileOperationResponse);
  rpc ListDirectory(FileOperationRequest) returns (ListDirectoryResponse);
  rpc Exists(FileOperationRequest) returns (ExistsResponse);

  // Service Management
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);
  rpc GetServiceStatus(ServiceRequest) returns (ServiceStatusResponse);
  rpc StartService(ServiceRequest) returns (MessageResponse);
  rpc StopService(ServiceRequest) returns (MessageResponse);
  rpc CreateService(CreateServiceRequest) returns (MessageResponse);
  rpc DeleteService(ServiceRequest) returns (MessageResponse);

  // DLL Overrides
  rpc ListDllOverrides(ListDllOverridesRequest) returns (ListDllOverridesResponse);
  rpc GetDllOverride(DllOverrideRequest) returns (DllOverrideResponse);
  rpc SetDllOverride(SetDllOverrideRequest) returns (MessageResponse);
  rpc DeleteDllOverride(DllOverrideRequest) returns (MessageResponse);

  // System
  rpc Shutdown(ShutdownRequest) returns (MessageResponse); // Terminates the Agent
  rpc Wineboot(WinebootRequest) returns (MessageResponse);
  rpc GetDriveInfo(DriveInfoRequest) returns (DriveInfoResponse);
}

message MessageResponse {
  bool success = 1;
  optional string error = 2;
}

// Process
message Process {
  uint32 pid = 1;
  string name = 2;
  uint32 threads = 3;
}

message ListProcessesResponse {
  repeated Process processes = 1;
}

message LaunchProcessRequest {
  string executable = 1;
  repeated string arguments = 2;
  optional string working_directory = 3;
  bool new_console = 4;
}

message LaunchProcessResponse {
  uint32 pid = 1;
}

message KillProcessRequest {
  uint32 pid = 1;
}

// Registry
enum RegistryHive {
  REGISTRY_HIVE_UNSPECIFIED = 0;
  REGISTRY_HIVE_CLASSES_ROOT = 1;
  REGISTRY_HIVE_CURRENT_CONFIG = 2;
  REGISTRY_HIVE_CURRENT_USER = 3;
  REGISTRY_HIVE_LOCAL_MACHINE = 4;
  REGISTRY_HIVE_USERS = 5;
}

message RegistryMultiString {
  repeated string values = 1;
}

message RegistryValue {
  oneof value {
    bytes none = 1;
    bytes binary = 2;
    uint32 dword = 3;
    uint64 qword = 4;
    string expand_string = 5;
    RegistryMultiString multi_string = 6;
    string string = 7;
  }
}

message RegistryKeyValue {
  string name = 1;
  RegistryValue value = 2;
}

message RegistryKey {
  RegistryHive hive = 1;
  string subkey = 2;
  repeated RegistryKeyValue values = 3;
}

message RegistryKeyRequest {
  RegistryHive hive = 1;
  string subkey = 2;
}

message RegistryValueRequest {
  RegistryHive hive = 1;
  string subkey = 2;
  string name = 3;
}

message SetRegistryValueRequest {
  RegistryHive hive = 1;
  string subkey = 2;
  string name = 3;
  RegistryValue value = 4;
}

// File System
message FileOperationRequest {
  string path = 1;
}

message FileOperationResponse {
  bool success = 1;
  string error = 2;
}

message CopyMoveRequest {
  string source = 1;
  string destination = 2;
}

message FileInfo {
  string name = 1;
  bool is_dir = 2;
  uint64 size = 3;
}

message ListDirectoryResponse {
  repeated FileInfo files = 1;
}

message ExistsResponse {
  bool exists = 1;
  bool is_dir = 2;
}

// Service API
message ListServicesRequest {}

message ServiceInfo {
  string name = 1;
  string display_name = 2;
  int32 state = 3;
  int32 start_type = 4;
}

message ListServicesResponse {
  repeated ServiceInfo services = 1;
}

message ServiceRequest {
  string name = 1;
}

enum ServiceState {
  SERVICE_STOPPED = 0;
  SERVICE_START_PENDING = 1;
  SERVICE_STOP_PENDING = 2;
  SERVICE_RUNNING = 3;
  SERVICE_CONTINUE_PENDING = 4;
  SERVICE_PAUSE_PENDING = 5;
  SERVICE_PAUSED = 6;
}

message ServiceStatusResponse {
  string name = 1;
  ServiceState state = 2;
}

enum ServiceStartType {
  SERVICE_BOOT_START = 0;
  SERVICE_SYSTEM_START = 1;
  SERVICE_AUTO_START = 2;
  SERVICE_DEMAND_START = 3;
  SERVICE_DISABLED = 4;
}

message CreateServiceRequest {
  string name = 1;
  string display_name = 2;
  string binary_path = 3;
  ServiceStartType start_type = 4;
}

// DLL Overrides
enum DllOverrideMode {
  NATIVE_BUILTIN = 0;
  BUILTIN_NATIVE = 1;
  NATIVE = 2;
  BUILTIN = 3;
  DISABLED = 4;
}

message DllOverride {
  string dll = 1;
  DllOverrideMode mode = 2;
}

message ListDllOverridesRequest {}

message ListDllOverridesResponse {
  repeated DllOverride overrides = 1;
}

message DllOverrideRequest {
  string dll = 1;
}

message DllOverrideResponse {
  string dll = 1;
  DllOverrideMode mode = 2;
}

message SetDllOverrideRequest {
  string dll = 1;
  DllOverrideMode mode = 2;
}

// System
message ShutdownRequest {}

enum WinebootMode {
  NORMAL = 0;
  SHUTDOWN = 1;
  KILL = 2;
}

message WinebootRequest {
  WinebootMode mode = 1;
}

message DriveInfoRequest {}

message DriveInfoResponse {
  repeated Drive drives = 1;
}

message Drive {
  string letter = 1; // "C", "Z"
  string label = 2;
  uint64 total_space = 3;
  uint64 free_space = 4;
}
